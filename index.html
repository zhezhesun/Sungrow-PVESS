<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sungrow海外GEO月报-光储</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sungrow-orange: #ff6a00;
      --sungrow-orange-dark: #e85f00;
      --sungrow-orange-light: #fff1e6;
      --text: #0f172a;
      --muted: #64748b;
      --line: #f3d8c3;
    }

    html, body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 106, 0, 0.14), transparent 30%),
        linear-gradient(135deg, #fff7f0 0%, #ffffff 52%, #fff3e8 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 20px;
      overflow-x: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 960px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 54px rgba(255, 106, 0, 0.11);
      padding: 28px 42px 26px;
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .sungrow-corner {
      position: absolute;
      top: 22px;
      right: 28px;
      width: 120px;
      height: auto;
      opacity: 0.95;
    }

    .brand {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
      padding-top: 2px;
    }

    .brand img {
      width: 142px;
      max-width: 42vw;
      height: auto;
      display: block;
    }

    .header {
      text-align: center;
      margin-bottom: 22px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 999px;
      background: var(--sungrow-orange-light);
      color: var(--sungrow-orange-dark);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 106, 0, 0.16);
    }

    h1 {
      font-size: clamp(30px, 4.4vw, 44px);
      line-height: 1.08;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
      max-width: 680px;
      margin: 0 auto;
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .report-button {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 118px;
      padding: 18px;
      border-radius: 18px;
      text-decoration: none;
      color: var(--text);
      background: #ffffff;
      border: 1px solid #f2dccb;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.055);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      overflow: hidden;
    }

    .report-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 106, 0, 0.12), rgba(255, 106, 0, 0.03));
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .report-button::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--sungrow-orange), #ff9a3d);
    }

    .report-button:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 106, 0, 0.35);
      box-shadow: 0 14px 30px rgba(255, 106, 0, 0.15);
    }

    .report-button:hover::before {
      opacity: 1;
    }

    .month {
      position: relative;
      z-index: 1;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .label {
      position: relative;
      z-index: 1;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .arrow {
      position: relative;
      z-index: 1;
      align-self: flex-end;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--sungrow-orange-light);
      color: var(--sungrow-orange);
      font-size: 17px;
      font-weight: 800;
      transition: background 0.22s ease, color 0.22s ease;
    }

    .report-button:hover .arrow {
      background: var(--sungrow-orange);
      color: #ffffff;
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }

    @media (max-width: 860px) {
      body {
        align-items: flex-start;
        padding: 18px 14px;
      }

      .container {
        padding: 30px 24px 26px;
      }

      .sungrow-corner {
        width: 104px;
        top: 20px;
        right: 22px;
      }

      .report-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .sungrow-corner {
        position: static;
        display: block;
        margin: 0 auto 12px;
        width: 108px;
      }
    }

    @media (max-width: 520px) {
      .container {
        padding: 26px 18px 24px;
        border-radius: 22px;
      }

      .brand img {
        width: 126px;
      }

      .report-grid {
        grid-template-columns: 1fr;
      }

      .report-button {
        min-height: 104px;
      }
    }
  </style>
</head>
